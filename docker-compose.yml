services:
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: sqlite:////data/spacemission.db
      CORS_ORIGINS: http://localhost:5173,http://127.0.0.1:5173
    volumes:
      - api_data:/data
    command: >
      sh -c "python -m scripts.seed_missions &&
             uvicorn app.main:app --host 0.0.0.0 --port 8000"

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    ports:
      - "5173:80"
    depends_on:
      - api

volumes:
  api_data:
